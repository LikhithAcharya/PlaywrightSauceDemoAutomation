name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests (Shard ${{ matrix.shard }})
      run: npx playwright test tests/ProductPage.spec.js --shard=${{ matrix.shard }}/4
    - name: Upload Allure results (Shard ${{ matrix.shard }})
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-shard-${{ matrix.shard }}
        path: allure-results

  merge-allure-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Merge Allure results
        run: |
          mkdir merged-results
          find allure-results -type f -name "*.json" -exec cp {} merged-results \;

      - name: Generate Allure report
        run: allure generate merged-results --clean -o allure-report

      - name: Upload final Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-final
          path: allure-report
          retention-days: 30
